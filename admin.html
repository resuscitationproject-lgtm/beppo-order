<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#171714"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="Beppo管理"><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./assets/admin-icon-192.svg"><link rel="stylesheet" href="./css/variables.css"><link rel="stylesheet" href="./css/reset.css"><link rel="stylesheet" href="./css/style.css"><link rel="stylesheet" href="./css/admin.css"><title>Beppo管理</title></head><body class="admin-body"><div id="offline-banner" class="offline-banner" role="alert" hidden>オフラインです。表示中の情報は最後に同期した内容です。管理操作はできません。</div>
<main id="login-view" class="admin-login"><section class="login-card"><p class="eyebrow">Store management</p><h1>Beppo</h1><p id="login-help" style="margin-top:12px;color:var(--color-muted)">管理PINを入力してください。</p><form id="login-form"><label class="field" style="margin-top:24px"><span>管理PIN</span><span class="pin-wrap"><input id="admin-pin" type="password" inputmode="numeric" pattern="[0-9]*" aria-describedby="login-error" required><button id="toggle-pin" class="icon-button" type="button" aria-label="PINを表示">表示</button></span></label><p id="login-error" class="login-error" role="alert"></p><button id="login-button" class="button button-wide" style="margin-top:18px" type="submit">管理画面を開く</button></form><button class="button button-secondary button-wide" style="margin-top:10px" type="button" data-install="admin">Beppo管理をホーム画面に追加</button></section></main>
<main id="admin-app" class="admin-app" hidden><aside class="admin-sidebar"><div class="admin-top"><div><strong class="admin-brand">Beppo</strong><div id="admin-clock" class="admin-clock">--:--</div></div><button id="logout" class="icon-button" type="button">ログアウト</button></div><div id="connection" class="connection"><span class="status-dot"></span><span>接続中</span>・<span id="last-sync">未同期</span></div><section class="admin-card"><h2>営業状態</h2><p id="business-state" class="business-state">—</p></section><section class="admin-card stock-panel"><span>本日の残り</span><strong id="admin-stock" class="admin-stock">—<small>食</small></strong></section><div class="stats-grid"><div class="stat"><span>提供予定</span><strong id="stat-planned">—</strong></div><div class="stat"><span>モバイルオーダー</span><strong id="stat-mobile">—</strong></div><div class="stat"><span>店頭販売</span><strong id="stat-counter">—</strong></div><div class="stat"><span>店頭取り置き</span><strong id="stat-reserved">—</strong></div><div class="stat"><span>受取待ち</span><strong id="stat-waiting">—</strong></div><div class="stat"><span>売上見込</span><strong id="stat-sales">—</strong></div></div><section class="admin-card"><h2>店頭・営業操作</h2><div class="admin-actions" style="margin-top:14px"><button class="button counter-button" data-action="counter" type="button">店頭販売 −1食</button><button class="button button-secondary" data-action="open" type="button">営業開始</button><button class="button button-secondary" data-action="stock" type="button">提供予定数</button><button class="button button-secondary" data-action="reservation" type="button">店頭取り置き数</button><button class="button button-secondary" data-action="menu" type="button">本日の内容</button><button class="button button-secondary" data-action="soldout" type="button">売り切れ</button><button class="button button-secondary" data-action="close" type="button">営業終了</button><button class="button button-secondary" data-action="holiday" type="button">休業</button></div></section></aside>
<section class="admin-main"><header class="main-header"><div class="main-header-row"><div><p class="eyebrow">Today's orders</p><h1>本日の注文</h1></div><div><button id="sound-toggle" class="button button-secondary" type="button">通知音 OFF</button><button id="refresh" class="icon-button" type="button" aria-label="今すぐ更新">↻</button></div></div><div id="new-order-banner" class="new-order-banner" hidden tabindex="0"></div><div class="next-pickup"><span>次の受取</span><strong id="next-pickup">予定はありません</strong></div></header><div id="order-list" class="order-list" aria-live="polite"></div></section></main><div id="undo-toast" class="undo-toast" hidden><span>店頭販売を1食登録しました</span><button id="undo-counter" class="button" type="button">1食戻す</button></div>
<script src="./js/config.js"></script><script src="./js/storage.js"></script><script src="./js/validation.js"></script><script src="./js/modal.js"></script><script src="./js/api.js"></script><script src="./js/install.js"></script><script src="./js/admin.js"></script></body></html>
