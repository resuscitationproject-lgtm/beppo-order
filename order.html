<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#171714">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/order.css">
  <title>モバイルオーダー｜Beppo</title>
</head>
<body class="order-shell">
  <noscript><p class="noscript">注文にはJavaScriptが必要です。店舗へお電話ください。</p></noscript>
  <div id="order-loading" class="order-loading" role="status" aria-live="polite" aria-label="モバイルオーダーを読み込み中">
    <div class="order-loading-card">
      <span class="order-loading-spinner" aria-hidden="true"></span>
      <strong>現在読み込み中</strong>
      <p>本日のメニュー・残り食数・受取時間を確認しています。</p>
      <small>画面が切り替わるまで、そのままお待ちください。</small>
    </div>
  </div>
  <header class="order-header">
    <a class="icon-button" href="./index.html" aria-label="トップページへ戻る">←</a>
    <strong class="order-brand">Beppo</strong>
    <span id="order-stock" class="header-stock" aria-live="polite">--食</span>
  </header>

  <main id="order-main" class="container" aria-busy="true">
    <div class="steps" aria-label="注文ステップ">
      <span class="step active">一皿ずつ</span><span class="step active">追加</span><span class="step active">受取</span><span class="step active">お名前</span>
    </div>
    <div id="order-error" class="error-panel" hidden><p></p><button class="button button-secondary" type="button" id="order-retry">再読み込み</button></div>

    <form id="order-form" novalidate>
      <fieldset class="order-section">
        <legend>1. カレーを一皿ずつ選ぶ</legend>
        <p class="section-help">基本とハーフなど、1食ごとにメニュー・辛さ・トッピングを変えられます。</p>
        <div id="plate-list" class="plate-list" aria-live="polite"></div>
        <button id="add-plate" class="button button-secondary button-wide" type="button">＋ もう1食追加する</button>
        <p id="quantity-note" class="install-note"></p>
        <p class="field-error" data-error="quantity"></p>
      </fieldset>

      <fieldset class="order-section">
        <legend>2. デザート・ドリンク</legend>
        <p class="section-help">こちらは注文全体への追加です。カレーと一緒のセット価格を適用します。</p>
        <h2>デザート</h2><div id="dessert-choices" class="choice-grid two"></div>
        <h2 class="subheading">ドリンク</h2><div id="drink-choices" class="choice-grid two"></div>
      </fieldset>

      <fieldset class="order-section">
        <legend>3. 受取時間を選ぶ</legend>
        <div id="slot-choices" class="choice-grid two"></div>
        <p class="field-error" data-error="pickupTime"></p>
      </fieldset>

      <fieldset class="order-section">
        <legend>4. お名前・電話番号</legend>
        <div class="form-grid two">
          <div class="field"><label for="customer-name">お名前 <small>必須</small></label><input id="customer-name" name="customerName" autocomplete="name" maxlength="60" required><p class="field-error" data-error="customerName"></p></div>
          <div class="field"><label for="phone">電話番号 <small>必須</small></label><input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="090-1234-5678" required><p class="field-error" data-error="phone"></p></div>
        </div>
        <div class="form-grid two form-spacer">
          <div class="field"><label for="notes">備考 <small>任意</small></label><textarea id="notes" name="notes" maxlength="500"></textarea></div>
          <div class="field"><label for="allergies">アレルギー等 <small>任意</small></label><textarea id="allergies" name="allergies" maxlength="500"></textarea></div>
        </div>
        <label class="consent consent-spacer"><input id="privacy-consent" type="checkbox" required><span><a href="./privacy.html" target="_blank">個人情報の利用目的</a>を確認し、注文対応のための利用に同意します</span></label>
        <p class="field-error" data-error="privacyConsent"></p>
      </fieldset>
    </form>
  </main>

  <div class="total-bar"><div class="total-inner"><span class="total-copy"><small id="total-quantity">1食</small>合計<strong id="order-total">0円</strong></span><button id="confirm-button" class="button" type="submit" form="order-form" disabled>オーダー内容を確認する</button></div></div>
  <script src="./js/config.js"></script><script src="./js/storage.js"></script><script src="./js/validation.js"></script><script src="./js/modal.js"></script><script src="./js/api.js"></script><script src="./js/order.js"></script>
</body>
</html>
