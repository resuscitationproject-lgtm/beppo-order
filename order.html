<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#171714"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="./manifest.json"><link rel="stylesheet" href="./css/variables.css"><link rel="stylesheet" href="./css/reset.css"><link rel="stylesheet" href="./css/style.css"><link rel="stylesheet" href="./css/order.css"><title>今日のカレーを取り置く｜Beppo</title></head><body class="order-shell"><header class="order-header"><a class="icon-button" href="./index.html" aria-label="トップページへ戻る">←</a><strong class="order-brand">Beppo</strong><span id="order-stock" class="header-stock" aria-live="polite">--食</span></header><main class="container"><div class="steps" aria-label="注文ステップ"><span class="step active">カレー</span><span class="step active">お好み</span><span class="step active">追加</span><span class="step active">受取</span><span class="step active">お名前</span></div><div id="order-error" class="error-panel" hidden><p></p><button class="button button-secondary" type="button" id="order-retry">再読み込み</button></div><form id="order-form" novalidate>
<fieldset class="order-section"><legend>1. カレーを選ぶ</legend><div id="menu-choices" class="choice-grid"></div><div style="margin-top:20px"><span class="field-label">数量</span><div class="quantity-control"><button type="button" data-quantity="-1" aria-label="数量を1減らす">−</button><output id="quantity" class="quantity-value">1</output><button type="button" data-quantity="1" aria-label="数量を1増やす">＋</button></div><p id="quantity-note" class="install-note"></p></div></fieldset>
<fieldset class="order-section"><legend>2. 辛さ・ビーガンを選ぶ</legend><p class="field-label">辛さ</p><div id="spice-choices" class="choice-grid two"></div><p class="field-label" style="margin-top:20px">ビーガン対応</p><div id="vegan-choices" class="choice-grid two"></div><p id="vegan-note" class="install-note"></p></fieldset>
<fieldset class="order-section"><legend>3. 追加商品を選ぶ</legend><h2 style="font-size:19px">トッピング</h2><div id="topping-choices" class="choice-grid two"></div><h2 style="font-size:19px;margin-top:26px">デザート</h2><div id="dessert-choices" class="choice-grid two"></div><h2 style="font-size:19px;margin-top:26px">ドリンク</h2><div id="drink-choices" class="choice-grid two"></div></fieldset>
<fieldset class="order-section"><legend>4. 受取時間を選ぶ</legend><div id="slot-choices" class="choice-grid two"></div><p class="field-error" data-error="pickupTime"></p></fieldset>
<fieldset class="order-section"><legend>5. お名前・電話番号</legend><div class="form-grid two"><div class="field"><label for="customer-name">お名前 <small>必須</small></label><input id="customer-name" name="customerName" autocomplete="name" maxlength="60" required><p class="field-error" data-error="customerName"></p></div><div class="field"><label for="phone">電話番号 <small>必須</small></label><input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="090-1234-5678" required><p class="field-error" data-error="phone"></p></div></div><div class="form-grid two" style="margin-top:18px"><div class="field"><label for="notes">備考 <small>任意</small></label><textarea id="notes" name="notes" maxlength="500"></textarea></div><div class="field"><label for="allergies">アレルギー等 <small>任意</small></label><textarea id="allergies" name="allergies" maxlength="500"></textarea></div></div><label class="consent" style="margin-top:20px"><input id="privacy-consent" type="checkbox" required><span><a href="./privacy.html" target="_blank">個人情報の利用目的</a>を確認し、注文対応のための利用に同意します</span></label><p class="field-error" data-error="privacyConsent"></p></fieldset></form></main>
<div class="total-bar"><div class="total-inner"><span class="total-copy">合計<strong id="order-total">0円</strong></span><button id="confirm-button" class="button" type="submit" form="order-form" disabled>注文内容を確認する</button></div></div><script src="./js/config.js"></script><script src="./js/storage.js"></script><script src="./js/validation.js"></script><script src="./js/modal.js"></script><script src="./js/api.js"></script><script src="./js/order.js"></script></body></html>
